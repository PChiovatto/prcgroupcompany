*{margin:0;padding:0;box-sizing:border-box}
html,body{margin:0;padding:0}
.ad{position:relative;width:1080px;height:1350px;overflow:hidden;
  font-family:'Manrope',sans-serif;background:#000}
.ad__photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:saturate(1.02) contrast(1.03)}
.ad__scrim{position:absolute;inset:0;background:
   linear-gradient(180deg, rgba(0,0,0,.55) 0%, rgba(0,0,0,0) 26%, rgba(0,0,0,0) 40%, rgba(0,0,0,.72) 78%, rgba(0,0,0,.9) 100%)}
.ad__frame{position:absolute;inset:48px;border:10px solid rgba(255,255,255,.9);border-radius:6px;pointer-events:none}
.ad__in{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:space-between;padding:78px}
.top{display:flex;align-items:flex-start;justify-content:space-between;gap:20px}
.logo{display:block}
.badge{display:inline-flex;align-items:center;gap:8px;background:#fff;color:#000;
  font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:19px;letter-spacing:.4px;
  padding:9px 16px;border-radius:50px;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.35)}
.badge .star{color:#000}
.bottom{display:flex;flex-direction:column;gap:18px}
.eyebrow{display:inline-block;align-self:flex-start;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;
  font-weight:800;font-size:21px;letter-spacing:3px;text-transform:uppercase;
  border-left:5px solid #fff;padding-left:12px;line-height:1.1;opacity:.95}
.hl{color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:99px;line-height:1.02;
  letter-spacing:-.5px;text-shadow:0 3px 28px rgba(0,0,0,.55);max-width:100%}
.sub{color:rgba(255,255,255,.92);font-size:25px;font-weight:500;line-height:1.35;max-width:92%;
  text-shadow:0 2px 14px rgba(0,0,0,.5)}
.ctarow{display:flex;align-items:center;gap:22px;flex-wrap:wrap;margin-top:8px}
.cta{display:inline-flex;align-items:center;gap:10px;background:#fff;color:#000;
  font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:27px;letter-spacing:.3px;
  padding:16px 30px;border-radius:50px;box-shadow:0 10px 30px rgba(0,0,0,.4)}
.cta .arw{font-weight:800}
.phone{color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:30px;letter-spacing:.4px;
  display:inline-flex;align-items:center;gap:9px;text-shadow:0 2px 12px rgba(0,0,0,.6)}
.phone .ic{font-size:27px}
