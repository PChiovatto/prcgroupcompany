# Netlify configuration for PRC Group static site
[build]
  publish = "."

# Static site: no build command needed.
# Netlify Forms is auto-detected from the form in index.html (data-netlify="true").

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
